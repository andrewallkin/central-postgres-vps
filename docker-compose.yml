services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-central
    restart: always
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - postgres-net

volumes:
  pgdata:

networks:
  postgres-net:
    external: true
